<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up</title>
    <link rel="stylesheet" href="/CSS/signup.css">
</head>
<body>
    <div class="auth-container">
        <div class="auth-card">
            <h1>CP Tracker</h1>
            <h2>Create Account</h2>
            <form action="/signup" method="POST">
                <input
                    type="text"
                    name="name"
                    placeholder="Full Name"
                    required
                >
                <input
                    type="email"
                    name="email"
                    placeholder="Email"
                    required
                >
                <input
                    type="password"
                    name="password"
                    placeholder="Password"
                    required
                >
                <input
                    type="password"
                    name="confirmPassword"
                    placeholder="Confirm Password"
                    required
                >
                <button type="submit">
                    Create Account
                </button>
            </form>
            <p>
                Already have an account?
                <a href="/Pages/login.html">
                    Login
                </a>
            </p>
        </div>
    </div>
</body>
</html>
