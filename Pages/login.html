<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="stylesheet" href="/CSS/login.css">
</head>
<body>
    <div class="auth-container">
        <div class="auth-card">
            <h1>CP Tracker</h1>
            <h2>Welcome Back</h2>
            <form action="/login" method="POST">
                <input
                    type="email"
                    name="email"
                    placeholder="Email"
                    required
                >
                <input
                    type="password"
                    name="password"
                    placeholder="Password"
                    required
                >
                <button type="submit">
                    Login
                </button>
            </form>
            <p>
                Don't have an account?
                <a href="/Pages/signup.html">
                    Sign Up
                </a>
            </p>

        </div>

    </div>

</body>
</html>
