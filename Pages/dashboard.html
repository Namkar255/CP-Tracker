<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard</title>
    <link rel="stylesheet" href="dashboard.css">
</head>
<body>
    <h1>Dashboard</h1>
    <section class="stats">
        <div class="stat-card">
            <h2>1306</h2>
            <p>Codeforces Rating</p>
        </div>
        <div class="stat-card">
            <h2>300</h2>
            <p>LeetCode Solved</p>
        </div>
        <div class="stat-card">
            <h2>800</h2>
            <p>AtCoder Rating</p>
        </div>
    </section>
    <section class="progress">
        <h2>Today's Goal Progress</h2>
        <div class="progress-bar">
            <div class="progress-fill"></div>
        </div>
    </section>
    <section class="activity">
        <h2>Recent Activity</h2>
        <ul>
            <li>Solved Two Sum</li>
            <li>Participated in CF Round #1050</li>
            <li>Solved DP Problem</li>
            <li>Reached 300 LC Problems</li>
        </ul>
    </section>
</body>
</html>
