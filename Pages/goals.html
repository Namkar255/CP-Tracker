<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Goals</title>
    <link rel="stylesheet" href="goals.css">
</head>
<body>
    <header>
        <h1> My Goals</h1>
        <h2> Track and Manage your Coding Goals</h2>
    </header>
    <section class="input-section">
        <input type="text" id="goal-input" placeholder="Enter your goal">
        <button id="add-goal-btn">Add Goal</button>
    </section>
    <section class="goals-section">
        <h2>My Goals</h2>
        <ul id="goals-list">
            <li>
                <input type="checkbox" class="goal-checkbox">
                <div class="goal-statement">Reach Specialist on Codeforces  </div>
            </li>
            <li>
                <input type="checkbox" class="goal-checkbox">
                <div class="goal-statement">Solve 300 Problems on LeetCode</div>
            </li>
            <li>
                <input type="checkbox" class="goal-checkbox">
                <div class="goal-statement">Participate in 5 Codeforces Contests</div>
            </li>
        </ul>
</body>
</html>
